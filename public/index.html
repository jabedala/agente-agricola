<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Agrícola IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-container { height: calc(100vh - 160px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-green-800 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <div class="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-tractor text-3xl text-green-700"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Bienvenido</h1>
            <p class="text-gray-500 mb-6">Ingresa tu número de empleado para comenzar el registro.</p>
            <input type="number" id="emp-id" placeholder="ID de Empleado" 
                   class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 mb-4 focus:border-green-500 outline-none transition-all">
            <button onclick="login()" class="w-full bg-green-700 text-white font-bold py-3 rounded-xl hover:bg-green-800 transition-all">
                Ingresar al Sistema
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col h-screen">
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-green-600 p-2 rounded-lg text-white">
                    <i class="fas fa-robot"></i>
                </div>
                <div>
                    <h2 class="font-bold text-gray-800">Asistente IA</h2>
                    <p id="user-display" class="text-[10px] text-green-600 font-bold uppercase"></p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-gray-400 hover:text-red-500">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </header>

        <main id="chat-window" class="chat-container overflow-y-auto p-4 space-y-4 flex-1">
            <div class="flex justify-start">
                <div class="bg-white border p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%]">
                    <p class="text-sm text-gray-700">Hola. Estoy listo para tomar tus registros de hoy. ¿Qué tarea realizaste o en qué parcela estuviste?</p>
                </div>
            </div>
        </main>

        <div id="loading" class="hidden px-6 py-2 text-xs text-gray-400 italic">
            <i class="fas fa-circle-notch animate-spin mr-1"></i> La IA está analizando las tablas...
        </div>

        <footer class="p-4 bg-white border-t">
            <form id="chat-form" class="max-w-4xl mx-auto flex gap-2">
                <input type="text" id="user-input" autocomplete="off"
                       placeholder="Escribe tu registro aquí..." 
                       class="flex-1 bg-gray-100 border-none rounded-full px-5 py-3 text-sm focus:ring-2 focus:ring-green-500 outline-none">
                <button type="submit" class="bg-green-700 text-white w-12 h-12 rounded-full flex items-center justify-center hover:bg-green-800 shadow-lg transition-transform active:scale-90">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </footer>
    </div>

    <script>
        let currentUserId = "";

        function login() {
            const idInput = document.getElementById('emp-id');
            if (idInput.value.trim() === "") return alert("Por favor ingresa tu ID");
            
            currentUserId = idInput.value;
            document.getElementById('user-display').innerText = "Empleado ID: " + currentUserId;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }

        const chatForm = document.getElementById('chat-form');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const loading = document.getElementById('loading');

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const mensaje = userInput.value.trim();
            if (!mensaje) return;

            // 1. Agregar mensaje del usuario a la pantalla
            appendMessage('user', mensaje);
            userInput.value = "";
            loading.classList.remove('hidden');

            try {
                // 2. Llamada a la API en Vercel
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mensaje: mensaje,
                        idEmpleado: currentUserId
                    })
                });

                const data = await response.json();
                
                // 3. Mostrar respuesta de la IA
                appendMessage('ai', data.texto || "Lo siento, hubo un error al procesar.");
            } catch (error) {
                appendMessage('ai', "Error de conexión con el servidor.");
            } finally {
                loading.classList.add('hidden');
            }
        });

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const content = `
                <div class="${role === 'user' ? 'bg-green-700 text-white rounded-tr-none' : 'bg-white border text-gray-700 rounded-tl-none'} p-3 rounded-2xl shadow-sm max-w-[85%] text-sm">
                    ${text.replace(/\n/g, '<br>')}
                </div>
            `;
            
            wrapper.innerHTML = content;
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
